<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Gerador Pro de QR Code</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
<style>
:root {
    --bs-body-bg: #f8f9fa;
    --bs-body-color: #212529;
}
[data-theme="dark"] {
    --bs-body-bg: #212529;
    --bs-body-color: #f8f9fa;
}
body {
    background-color: var(--bs-body-bg);
    color: var(--bs-body-color);
}
#qr-preview {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 320px;
    border: 1px solid #ced4da;
    border-radius: .5rem;
    background: var(--preview-bg, #fff);
}
</style>
</head>
<body data-theme="light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Gerador Pro de QR Code</h1>
        <button id="themeToggle" class="btn btn-outline-secondary"><i class="bi bi-moon"></i> Tema</button>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="accordion" id="settingsAccordion">
                <!-- Content Section -->
                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingContent">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseContent" aria-expanded="true" aria-controls="collapseContent">
                            <i class="bi bi-file-earmark-text me-2"></i>Conteúdo
                        </button>
                    </h2>
                    <div id="collapseContent" class="accordion-collapse collapse show" aria-labelledby="headingContent">
                        <div class="accordion-body">
                            <div class="mb-3">
                                <label for="qrData" class="form-label fw-medium">Texto / URL</label>
                                <textarea class="form-control form-control-sm" id="qrData" rows="2">https://exemplo.com.br</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-medium">Tipo de Dado</label>
                                <select class="form-select form-select-sm" id="dataType">
                                    <option value="text" selected>Texto simples</option>
                                    <option value="url">URL</option>
                                    <option value="email">E‑mail (mailto:)</option>
                                    <option value="phone">Telefone (tel:)</option>
                                    <option value="sms">SMS</option>
                                    <option value="vcard">vCard</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Appearance Section -->
                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingAppearance">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseAppearance" aria-expanded="false" aria-controls="collapseAppearance">
                            <i class="bi bi-palette me-2"></i>Aparência
                        </button>
                    </h2>
                    <div id="collapseAppearance" class="accordion-collapse collapse" aria-labelledby="headingAppearance">
                        <div class="accordion-body">
                            <div class="mb-3">
                                <label class="form-label fw-medium">Tamanho (px)</label>
                                <input type="range" class="form-range" id="sizeRange" min="150" max="800" step="10" value="300">
                                <div class="d-flex justify-content-between small"><span id="sizeVal">300</span></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Margem interna (px)</label>
                                <input type="number" class="form-control form-control-sm" id="marginInput" min="0" max="100" value="10">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Cor de fundo</label>
                                <input type="color" class="form-control form-control-color" id="bgColor" value="#ffffff" title="Escolher cor de fundo">
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" id="bgGradientToggle">
                                    <label class="form-check-label" for="bgGradientToggle">Usar gradiente</label>
                                </div>
                                <div id="bgGradientOptions" class="mt-2 d-none">
                                    <label class="form-label small mb-1">Cor inicial</label>
                                    <input type="color" class="form-control form-control-color mb-2" id="bgGradStart" value="#ffffff">
                                    <label class="form-label small mb-1">Cor final</label>
                                    <input type="color" class="form-control form-control-color" id="bgGradEnd" value="#e0e0e0">
                                    <label class="form-label small mt-2">Direção</label>
                                    <select class="form-select form-select-sm" id="bgGradDirection">
                                        <option value="linear">Linear</option>
                                        <option value="radial">Radial</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Cor dos módulos (dots)</label>
                                <input type="color" class="form-control form-control-color" id="dotColor" value="#000000" title="Cor dos módulos">
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" id="dotGradientToggle">
                                    <label class="form-check-label" for="dotGradientToggle">Usar gradiente</label>
                                </div>
                                <div id="dotGradientOptions" class="mt-2 d-none">
                                    <label class="form-label small mb-1">Cor início</label>
                                    <input type="color" class="form-control form-control-color mb-2" id="dotGradStart" value="#000000">
                                    <label class="form-label small mb-1">Cor fim</label>
                                    <input type="color" class="form-control form-control-color" id="dotGradEnd" value="#ff0000">
                                    <label class="form-label small mt-2">Direção</label>
                                    <select class="form-select form-select-sm" id="dotGradDirection">
                                        <option value="linear">Linear</option>
                                        <option value="radial">Radial</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Tipo dos módulos</label>
                                <select class="form-select form-select-sm" id="dotStyle">
                                    <option value="dots" selected>Dots</option>
                                    <option value="rounded">Rounded</option>
                                    <option value="classy">Classy</option>
                                    <option value="square">Square</option>
                                    <option value="extra-rounded">Extra Rounded</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Cor dos olhos (cantos)</label>
                                <input type="color" class="form-control form-control-color" id="eyeColor" value="#000000">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Tipo dos olhos</label>
                                <select class="form-select form-select-sm" id="eyeStyle">
                                    <option value="square" selected>Square</option>
                                    <option value="dot">Dot</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Nível de correção de erro</label>
                                <select class="form-select form-select-sm" id="errorLevel">
                                    <option value="L">L – ~7 %</option>
                                    <option value="M" selected>M – ~15 %</option>
                                    <option value="Q">Q – ~25 %</option>
                                    <option value="H">H – ~30 %</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Logo Section -->
                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingLogo">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseLogo" aria-expanded="false" aria-controls="collapseLogo">
                            <i class="bi bi-image me-2"></i>Logo
                        </button>
                    </h2>
                    <div id="collapseLogo" class="accordion-collapse collapse" aria-labelledby="headingLogo">
                        <div class="accordion-body">
                            <div class="mb-3">
                                <label class="form-label fw-medium">Carregar logo (PNG, SVG, JPG)</label>
                                <input class="form-control form-control-sm" type="file" id="logoFile" accept="image/*">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-medium">Escala do logo (0.1‑1)</label>
                                <input type="range" class="form-range" id="logoScale" min="0.1" max="1" step="0.05" value="0.5">
                                <div class="d-flex justify-content-between small"><span id="logoScaleVal">0.5</span></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-medium">Margem interno do logo (px)</label>
                                <input type="number" class="form-control form-control-sm" id="logoMargin" min="0" max="50" value="5">
                            </div>
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" id="logoRounded">
                                <label class="form-check-label" for="logoRounded">Logo circular</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Export Section -->
                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingExport">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseExport" aria-expanded="false" aria-controls="collapseExport">
                            <i class="bi bi-download me-2"></i>Exportar
                        </button>
                    </h2>
                    <div id="collapseExport" class="accordion-collapse collapse" aria-labelledby="headingExport">
                        <div class="accordion-body">
                            <div class="d-grid gap-2">
                                <button class="btn btn-primary" id="downloadPng"><i class="bi bi-filetype-png me-2"></i>Baixar PNG</button>
                                <button class="btn btn-success" id="downloadSvg"><i class="bi bi-filetype-svg me-2"></i>Baixar SVG</button>
                                <button class="btn btn-outline-secondary" id="copyDataUrl"><i class="bi bi-clipboard me-2"></i>Copiar Data URL</button>
                            </div>
                            <div class="mt-3 small text-muted" id="feedback"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Preview Column -->
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0">Pré‑visualização</h5>
                    <button id="resetBtn" class="btn btn-outline-danger btn-sm"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
                </div>
                <div class="card-body d-flex justify-content-center align-items-center">
                    <div id="qr-preview"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/*
 * Gerador Pro de QR Code - lógica JavaScript
 * Requer: QRCodeStyling (versão 1.5+)
 */

const qr = new QRCodeStyling({
    width: 300,
    height: 300,
    data: "https://exemplo.com.br",
    image: "",
    margin: 10,
    qrOptions: {
        errorCorrectionLevel: "M"
    },
    imageOptions: {
        crossOrigin: "anonymous",
        margin: 5,
        // os valores de `imageOptions` permitem ajuste de escala depois
    },
    dotsOptions: {
        color: "#000000",
        type: "dots"
    },
    backgroundOptions: {
        color: "#ffffff"
    },
    cornersSquareOptions: {
        type: "square",
        color: "#000000"
    },
    cornersDotOptions: {
        type: "dot",
        color: "#000000"
    }
});

// Render inicial
const previewEl = document.getElementById('qr-preview');
qr.append(previewEl);

/* ----------- Element References----------- */
const el = {
    qrData: document.getElementById('qrData'),
    dataType: document.getElementById('dataType'),
    sizeRange: document.getElementById('sizeRange'),
    sizeVal: document.getElementById('sizeVal'),
    marginInput: document.getElementById('marginInput'),
    bgColor: document.getElementById('bgColor'),
    bgGradientToggle: document.getElementById('bgGradientToggle'),
    bgGradientOptions: document.getElementById('bgGradientOptions'),
    bgGradStart: document.getElementById('bgGradStart'),
    bgGradEnd: document.getElementById('bgGradEnd'),
    bgGradDirection: document.getElementById('bgGradDirection'),

    dotColor: document.getElementById('dotColor'),
    dotGradientToggle: document.getElementById('dotGradientToggle'),
    dotGradientOptions: document.getElementById('dotGradientOptions'),
    dotGradStart: document.getElementById('dotGradStart'),
    dotGradEnd: document.getElementById('dotGradEnd'),
    dotGradDirection: document.getElementById('dotGradDirection'),

    dotStyle: document.getElementById('dotStyle'),
    eyeColor: document.getElementById('eyeColor'),
    eyeStyle: document.getElementById('eyeStyle'),
    errorLevel: document.getElementById('errorLevel'),

    logoFile: document.getElementById('logoFile'),
    logoScale: document.getElementById('logoScale'),
    logoScaleVal: document.getElementById('logoScaleVal'),
    logoMargin: document.getElementById('logoMargin'),
    logoRounded: document.getElementById('logoRounded'),

    downloadPng: document.getElementById('downloadPng'),
    downloadSvg: document.getElementById('downloadSvg'),
    copyDataUrl: document.getElementById('copyDataUrl'),
    feedback: document.getElementById('feedback'),

    resetBtn: document.getElementById('resetBtn'),

    themeToggle: document.getElementById('themeToggle')
};

/* ----------- Helper Functions ---------- */
function getDataString() {
    const raw = el.qrData.value.trim();
    const type = el.dataType.value;
    // Simplesmente prefixa protocolos quando necessário (pode melhorar)
    switch (type) {
        case 'url':
            if (!raw.match(/^https?:\/\//i)) return 'https://' + raw;
            return raw;
        case 'email':
            return 'mailto:' + raw;
        case 'phone':
            return 'tel:' + raw;
        case 'sms':
            return 'sms:' + raw;
        case 'vcard':
            // Usuário pode inserir vCard completo no textarea
            return raw;
        default:
            return raw;
    }
}

function updateQRCode() {
    const size = parseInt(el.sizeRange.value, 10);
    const margin = parseInt(el.marginInput.value, 10) || 0;

    // --------- Cor de fundo ---------
    let bgOption = { color: el.bgColor.value };
    if (el.bgGradientToggle.checked) {
        bgOption = {
            // a biblioteca aceita `gradient` como array de cores + direction
            gradient: [
                { offset: 0, color: el.bgGradStart.value },
                { offset: 1, color: el.bgGradEnd.value }
            ],
            type: el.bgGradDirection.value // "linear" ou "radial"
        };
    }

    // --------- Cor dos módulos (dots) ---------
    let dotColorOption = el.dotColor.value;
    if (el.dotGradientToggle.checked) {
        dotColorOption = {
            gradient: [
                { offset: 0, color: el.dotGradStart.value },
                { offset: 1, color: el.dotGradEnd.value }
            ],
            type: el.dotGradDirection.value
        };
    }

    // --------- Logo handling ---------
    // Passamos `imageOptions` para controlar escala e margem
    const logoScale = parseFloat(el.logoScale.value);
    const logoMargin = parseInt(el.logoMargin.value, 10) || 0;
    const isRounded = el.logoRounded.checked;

    // Se houver logo carregado, precisamos ler como dataURL
    if (el.logoFile.files[0]) {
        const reader = new FileReader();
        reader.onload = function (e) {
            const base64 = e.target.result;
            const updateObj = {
                width: size,
                height: size,
                data: getDataString(),
                margin: margin,
                qrOptions: { errorCorrectionLevel: el.errorLevel.value },
                backgroundOptions: bgOption,
                dotsOptions: { color: dotColorOption, type: el.dotStyle.value },
                cornersSquareOptions: { type: el.eyeStyle.value, color: el.eyeColor.value },
                cornersDotOptions: { type: "dot", color: el.eyeColor.value }, // olhos menores
                image: base64,
                imageOptions: {
                    crossOrigin: "anonymous",
                    margin: logoMargin,
                    // Nota: `imageOptions` tem `hideBackgroundDots` mas não escala direta,
                    // usamos CSS para ajustar (via .qr-code-wrapper)
                }
            };
            // Ajuste de escala do logo via CSS
            const scaleWrapper = previewEl.querySelector('.qr-code-styling');
            // O QRCodeStyling não expõe scale, mas podemos aplicar transform.
            // Contudo, a biblioteca tem `imageOptions` com `crossOrigin` e `margin`. 
            // Para ajuste de escala, usamos a própria propriedade `imageOptions` `imageSize` (se disponível).
            if (typeof updateObj.imageOptions.imageSize === 'undefined') {
                // Algumas versões aceitam `imageOptions: { imageSize: logoScale }`
                // Utilizamos fallback CSS se não houver.
            }
            // Se a versão suportar, defina `imageOptions: { imageSize: logoScale }`
            updateObj.imageOptions.imageSize = logoScale; // 0‑1
            // Caso queira tornar o logo circular, usamos máscara CSS após render.
            qr.update(updateObj);
            applyLogoMask(isRounded);
        };
        reader.readAsDataURL(el.logoFile.files[0]);
    } else {
        // sem logo
        const updateObj = {
            width: size,
            height: size,
            data: getDataString(),
            margin: margin,
            qrOptions: { errorCorrectionLevel: el.errorLevel.value },
            backgroundOptions: bgOption,
            dotsOptions: { color: dotColorOption, type: el.dotStyle.value },
            cornersSquareOptions: { type: el.eyeStyle.value, color: el.eyeColor.value },
            cornersDotOptions: { type: "dot", color: el.eyeColor.value },
            image: "" // remove logo
        };
        qr.update(updateObj);
    }

    // Atualiza tamanho do slider exibido
    el.sizeVal.textContent = size;
}

/* ----------- UI interactivity ---------- */
function applyLogoMask(rounded) {
    // A QRCodeStyling renderiza o logo como `<img>` dentro de um wrapper.
    // Vamos aplicar CSS para deixar circular se necessário.
    const img = previewEl.querySelector('img');
    if (!img) return;
    if (rounded) {
        img.style.borderRadius = "50%";
        // Para evitar que o logo fique muito grande, garantimos que ele respeite a escala fornecida.
    } else {
        img.style.borderRadius = "0";
    }
}

// Listener de todos os inputs que disparam atualização ao mudar
const inputsToWatch = [
    el.qrData,
    el.dataType,
    el.sizeRange,
    el.marginInput,
    el.bgColor,
    el.bgGradientToggle,
    el.bgGradStart,
    el.bgGradEnd,
    el.bgGradDirection,
    el.dotColor,
    el.dotGradientToggle,
    el.dotGradStart,
    el.dotGradEnd,
    el.dotGradDirection,
    el.dotStyle,
    el.eyeColor,
    el.eyeStyle,
    el.errorLevel,
    el.logoFile,
    el.logoScale,
    el.logoMargin,
    el.logoRounded
];

inputsToWatch.forEach(input => {
    input.addEventListener('input', () => {
        // Se for toggle de gradiente, mostrar/ocultar opções
        if (input === el.bgGradientToggle) {
            el.bgGradientOptions.classList.toggle('d-none', !el.bgGradientToggle.checked);
        }
        if (input === el.dotGradientToggle) {
            el.dotGradientOptions.classList.toggle('d-none', !el.dotGradientToggle.checked);
        }
        // Atualiza valor numérico de sliders
        if (input === el.sizeRange) {
            el.sizeVal.textContent = input.value;
        }
        if (input === el.logoScale) {
            el.logoScaleVal.textContent = input.value;
        }
        // Dispara atualização
        updateQRCode();
    });
});

// Botões de download e cópia
el.downloadPng.addEventListener('click', () => {
    qr.download({ name: 'qr-code', extension: 'png' });
});
el.downloadSvg.addEventListener('click', () => {
    qr.download({ name: 'qr-code', extension: 'svg' });
});
el.copyDataUrl.addEventListener('click', async () => {
    try {
        const dataUrl = await qr.getRawData('png'); // obtém dataURL PNG
        await navigator.clipboard.writeText(dataUrl);
        el.feedback.textContent = "✅ Data URL copiado para a área de transferência!";
    } catch (e) {
        el.feedback.textContent = "❌ Falha ao copiar Data URL.";
    }
    setTimeout(() => (el.feedback.textContent = ""), 3000);
});

// Reset button
el.resetBtn.addEventListener('click', () => {
    // Reseta todos os campos para valores iniciais
    document.querySelector('form')?.reset(); // se houver <form>, mas não temos
    // Reset manual
    el.qrData.value = "https://exemplo.com.br";
    el.dataType.value = "url";
    el.sizeRange.value = 300;
    el.sizeVal.textContent = "300";
    el.marginInput.value = 10;
    el.bgColor.value = "#ffffff";
    el.bgGradientToggle.checked = false;
    el.bgGradientOptions.classList.add('d-none');
    el.dotColor.value = "#000000";
    el.dotGradientToggle.checked = false;
    el.dotGradientOptions.classList.add('d-none');
    el.dotStyle.value = "dots";
    el.eyeColor.value = "#000000";
    el.eyeStyle.value = "square";
    el.errorLevel.value = "M";
    el.logoFile.value = "";
    el.logoScale.value = 0.5;
    el.logoScaleVal.textContent = "0.5";
    el.logoMargin.value = 5;
    el.logoRounded.checked = false;

    // Força atualização
    updateQRCode();
});

// Switch tema claro/escuro
el.themeToggle.addEventListener('click', () => {
    const root = document.documentElement;
    const current = root.getAttribute('data-theme');
    if (current === 'light') {
        root.setAttribute('data-theme', 'dark');
        el.themeToggle.innerHTML = '<i class="bi bi-sun"></i> Claro';
        // Ajusta preview background
        previewEl.style.setProperty('--preview-bg', '#2c2c2c');
    } else {
        root.setAttribute('data-theme', 'light');
        el.themeToggle.innerHTML = '<i class="bi bi-moon"></i> Escuro';
        previewEl.style.setProperty('--preview-bg', '#fff');
    }
});

/* ---------- Inicialização ---------- */
updateQRCode(); // garante que tudo está sincronizado ao carregar a página

</script>
</body>
</html>
